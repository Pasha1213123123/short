plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id 'com.google.firebase.firebase-perf' 
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}


def dartEnvironmentVariables = [:]
if (project.rootProject.file("../.env").exists()) {
    project.rootProject.file("../.env").eachLine { line ->
        def matcher = (line =~ /^\s*(?:export\s+|)([\w\d\.\-_]+)\s*=\s*(['"]?)(.*)\2\s*$/)
        if (matcher.matches()) {
            dartEnvironmentVariables.put(matcher[0][1], matcher[0][3])
        }
    }
}


def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {

    namespace = "com.smartcode.shortmovieplayer"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.smartcode.shortmovieplayer"
        minSdkVersion flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName


        manifestPlaceholders += [
    ADMOB_APP_ID_ANDROID: dartEnvironmentVariables.get("ADMOB_APP_ID_ANDROID") ?: ""
]
    }


    signingConfigs {
        release {

            if (keystoreProperties['storeFile']) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            } else {

                keyAlias = 'androiddebugkey'
                keyPassword = 'android'
                storeFile = file('debug.keystore') 
                storePassword = 'android'
            }
        }
    }

    buildTypes {
        release {

            signingConfig = signingConfigs.release
            

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}