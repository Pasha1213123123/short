name: calkulator
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  

  flutter_localizations:
    sdk: flutter


  # youtube_player_flutter: ^9.1.2
  video_player: ^2.10.0

  firebase_core: ^4.1.1
  firebase_analytics: ^12.0.2
  firebase_crashlytics: ^5.0.2
  firebase_performance: ^0.11.1+4
  flutter_dotenv: ^6.0.0

  flutter_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  hexcolor: ^3.0.1
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  logger: ^2.6.2
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  

  build_runner: ^2.9.0
  husky: ^0.1.7

flutter:
  uses-material-design: true
  

  generate: true
  

  assets:
    - assets/
    - .env
    
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
